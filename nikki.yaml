# --- 5. 高级功能模块 ---
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  enable: true
  stack: system
  dns-hijack: ["any:53"]
  auto-route: true
  auto-detect-interface: true

# --- 6. DNS 优化 ---
dns:
  enable: true
  cache-algorithm: arc
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: false
  ipv6: true
  respect-rules: true
  use-hosts: false
  use-system-hosts: false
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.arpa"
    - "localhost.ptlogin2.qq.com"
    - "localhost.work.weixin.qq.com"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "time.*.com"
    - "ntp.*.com"
    - "geosite:connectivity-check"
    - "geosite:private"
    - "geosite:cn"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
    - "*.n.n.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.*.xboxlive.com"
    - "+.teracloud.jp"
    - "+.t.me"
    - "+.telegram.org"
    - "+.telegram.me"
    - "+.tdesktop.com"
    - "+.telegra.ph"
    - "+.telesco.pe"
    - "+.telegram-cdn.org"
    - "+.cdn-telegram.org"
    - "+.telegramdownload.com"
    - "+.telegram.dog"
    - "+.graph.org"
    - "+.legra.ph"
    - "+.tx.me"
    - "+.tg.dev"
    - "WORKGROUP"

  # 用于解析“DNS 上游域名本身”
  # 官方要求：default-nameserver 必须是 IP（可以是加密 DNS 但仍要求 IP 形式）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认 DNS（没命中 policy 的域名会走这里）
  # 你已经用 IP 直连 DoH 了（比 dns.alidns.com 这种域名更省一次解析）
  nameserver:
    - https://1.12.12.12/dns-query
    - https://223.5.5.5/dns-query

  # 仅用于“解析代理节点 server 的域名”
  # respect-rules: true 时，官方明确说需要配这个，避免“鸡生蛋”
  proxy-server-nameserver:
    - https://1.12.12.12/dns-query
    - https://223.5.5.5/dns-query

  # 用 nameserver-policy 做分流（替代你原来的 fallback/fallback-filter 思路）
  nameserver-policy:
    # 私有/局域网域名：不要走公共 DoH，优先走“你局域网/系统的 DNS”
    "geosite:private":
      - system

    # 国内域名：国内 DNS
    "geosite:cn":
      - https://1.12.12.12/dns-query
      - https://223.5.5.5/dns-query

    # 非 CN：海外 DoT（通常会按路由规则走代理）
    "geosite:geolocation-!cn":
      - tls://dns.google
      - tls://cloudflare-dns.com


# --- 分流规则 ---

rules:
  # ==============================
  # 0) DNS 上游固定走代理（避免 DoT/DoH 连接落入兜底）
  # ==============================
  - DOMAIN,cloudflare-dns.com,🚀 默认代理
  - DOMAIN,dns.google,🚀 默认代理
  - DOMAIN,dns.google.com,🚀 默认代理
  - DOMAIN,dns.cloudflare.com,🚀 默认代理
  - DOMAIN-SUFFIX,docker.fnnas.com,🚀 默认代理
  - DOMAIN-SUFFIX,docker-cache1.fnnas.com,🚀 默认代理

  # ==============================
  # 1) 🇨🇳 大陆安全隔离区（必须放最前）
  # ==============================
  # - GEOIP,PRIVATE,DIRECT
  # - GEOIP,CN,DIRECT
  # - GEOSITE,CN,DIRECT 

  # ==============================
  # 2) 业务规则集（RULE-SET）
  # ==============================
  - RULE-SET,YouTube,📹 YouTube
  - RULE-SET,Netflix,🎥 NETFLIX
  - RULE-SET,Telegram,📲 Telegram
  - RULE-SET,TMDB,🎬 tmdb刮削
  - RULE-SET,Google,🍀 Google
  - RULE-SET,GitHub,👨🏿‍💻 GitHub
  - RULE-SET,OpenAI,🤖 OpenAI

  - RULE-SET,BiliBili,DIRECT
  - RULE-SET,Apple,DIRECT
  - RULE-SET,115,DIRECT
  - RULE-SET,WeChat,DIRECT
  # ==============================
  # 3) 通用直连集合（放在业务后，避免抢流量）
  # ==============================
  - RULE-SET,LAN,DIRECT

  # ==============================
  # 4) 你手写的补充规则（可留可删，但要放在后面）
  # Apple：整站直连（补齐 www.apple.com 等未覆盖项）
  - DOMAIN-SUFFIX,apple.com,DIRECT

  # ==============================

  # ==============================
  # 5) 兜底
  # ==============================
  - MATCH,🐟 漏网之鱼
