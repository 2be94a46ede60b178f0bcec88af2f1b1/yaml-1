# ==========================================================
# Nikki 最终完美版 (已更新 RFC日本2 节点)
# ==========================================================

# --- 1. 基础全局设置 ---
port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: "*"
ipv6: false
log-level: warning
unified-delay: true
tcp-concurrent: true
find-process-mode: 'off'
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:
  Airport1:  # <--- 已修复：名称修改为 Airport1 以匹配下方的引用
    type: http
    # ==> 订阅链接 <==
    url: "http://192.168.100.80:3008/fKA6xwFUzpCc3RhahafE/download/%E8%87%AA%E5%BB%BA%E6%B5%8B%E8%AF%95"
    # 更新间隔（天）
    interval: 86400
    override:
      skip-cert-verify: false # 通常为 false，除非订阅需要

# --- 3. 策略组 ---
proxy-groups:
  - name: ♻️ 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "台湾|美西|新加坡|印度|自建|日本|RN|DMIT|VMISS|盐湖城|海创|HK"

  # 2. 默认代理 (图标: 🚀)
  - name: 🚀 默认代理
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    include-all: true
    filter: "台湾|美西|新加坡|印度|自建|日本|RN|DMIT|VMISS|盐湖城|海创|HK"

  #  业务策略组 (带精准图标)
  - name: 📹 YouTube
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    include-all: true
    filter: "台湾|美西|新加坡|印度|自建|日本|RN|DMIT|VMISS|盐湖城|海创|HK"

  - name: 🍀 Google
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    include-all: true
    filter: "台湾|美西|新加坡|印度|自建|日本|RN|DMIT|VMISS|盐湖城|海创|HK"

  - name: 🤖 OpenAI
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    include-all: true
    # 自动抓取美国出口和台湾出口节点
    filter: "美西|盐湖城|DMIT|RN|VMISS|台湾"

  - name: 👨🏿‍💻 GitHub
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    include-all: true
    filter: "美西|新加坡|日本|DMIT"

  - name: 📲 Telegram
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "新加坡|海创|HK|自建|SG"

  - name: 🎥 NETFLIX
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
    include-all: true
    filter: "台湾|美西|新加坡|印度|自建|日本|RN|DMIT|VMISS|盐湖城|海创|HK"
  - name: 🎬 tmdb刮削
    type: load-balance          # 核心修改：改为负载均衡模式
    strategy: round-robin       # 调度策略：轮询（一个流量换一个出口）
    url: https://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    # 正则逻辑：确保池子里只有美国出口，实现多出口并行
    filter: "🇺🇸|美西|盐湖城|DMIT|RN|VMISS"

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 默认代理
      - ♻️ 自动选择
      - DIRECT


